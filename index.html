<!DOCTYPE html>
<html>
<head>
<title>Food Spoilage Detection System</title>

<style>
body{
    font-family: Arial;
    background: #eef2f3;
    margin:0;
}

/* Header */
.header{
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:20px;
    font-size:26px;
    font-weight:bold;
}

/* Top Menu */
.menu{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:15px;
}
.menu button{
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:#2e7d32;
    color:white;
    cursor:pointer;
}

/* Cards */
.container{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.title{
    font-size:14px;
    color:gray;
}

.value{
    font-size:28px;
    font-weight:bold;
}

/* Progress bar */
.bar{
    height:8px;
    background:#ddd;
    border-radius:10px;
    margin-top:8px;
}
.fill{
    height:8px;
    background:#2e7d32;
    border-radius:10px;
}

/* Bottom */
.big{
    font-size:32px;
    font-weight:bold;
    color:#2e7d32;
}

.center{
    text-align:center;
    margin:20px;
}

button.refresh{
    padding:12px 25px;
    font-size:16px;
    border:none;
    background:#2e7d32;
    color:white;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
Food Spoilage Detection System
</div>

<!-- MENU -->
<div class="menu">
<button>REAL SENSOR</button>
<button>DRY</button>
<button>HEALTHY</button>
<button>LOW</button>
<button>HIGH</button>
</div>

<!-- DASHBOARD -->
<div class="container">

<div class="card">
<div class="title">Gas Level</div>
<div id="gas" class="value">--</div>
<div class="bar"><div id="gasBar" class="fill" style="width:0%"></div></div>
</div>

<div class="card">
<div class="title">Moisture</div>
<div id="moist" class="value">--</div>
<div class="bar"><div id="moistBar" class="fill" style="width:0%"></div></div>
</div>

<div class="card">
<div class="title">Food Status</div>
<div id="status" class="big">--</div>
</div>

<div class="card">
<div class="title">Health Score</div>
<div id="score" class="value">--</div>
<div class="bar"><div id="scoreBar" class="fill"></div></div>
</div>

</div>

<div class="center">
<button class="refresh" onclick="loadData()">Refresh</button>
</div>

<script>

async function loadData(){

let url="https://api.thingspeak.com/channels/3361476/feeds/last.json?api_key=W23Y9US9AT7U9T5S";

let response = await fetch(url);
let data = await response.json();

let gas = Number(data.field1);
let moist = Number(data.field2);

document.getElementById("gas").innerText = gas;
document.getElementById("moist").innerText = moist;

let status="FRESH";

if(gas>240 || moist<300)
status="ROTTEN";
else if(gas>180)
status="BAD";
else if(gas>120)
status="OK";

document.getElementById("status").innerText = status;

let score = 100 - (gas/3) - (300-moist)/5;
if(score<0) score=0;
if(score>100) score=100;

document.getElementById("score").innerText = Math.round(score)+"/100";

document.getElementById("gasBar").style.width = (gas/3)+"%";
document.getElementById("moistBar").style.width = (moist/10)+"%";
document.getElementById("scoreBar").style.width = score+"%";
}

loadData();

</script>

</body>
</html>
