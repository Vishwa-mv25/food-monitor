
<!DOCTYPE html>
<html>
<head>
<title>Food Monitor</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:40px;
margin:0;
}
.box{
background:white;
padding:30px;
border-radius:15px;
width:420px;
max-width:90%;
margin:auto;
box-shadow:0 0 12px rgba(0,0,0,0.2);
}
button{
padding:12px 20px;
font-size:18px;
border:none;
background:green;
color:white;
border-radius:10px;
cursor:pointer;
margin-top:15px;
}
</style>
</head>

<body>

<div class="box">
<h1>Food Spoilage Detection</h1>

<h2 id="gas">Gas: Loading...</h2>
<h2 id="moist">Moisture: Loading...</h2>
<h2 id="status">Status: Loading...</h2>

<button onclick="loadData()">Refresh</button>

</div>

<script>

async function loadData(){

let url="https://api.thingspeak.com/channels/3361476/feeds/last.json?api_key=W23Y9US9AT7U9T5S";

let response = await fetch(url);
let data = await response.json();

let gas = Number(data.field1);
let moist = Number(data.field2);

document.getElementById("gas").innerText="Gas Value: "+gas;
document.getElementById("moist").innerText="Moisture: "+moist;

let status="FRESH";

if(gas>240 || moist<300)
status="ROTTEN";
else if(gas>180)
status="BAD";
else if(gas>120)
status="OK";

document.getElementById("status").innerText="Food Status: "+status;
}

loadData();

</script>

</body>
</html>
