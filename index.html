
<!DOCTYPE html>
<html>
<head>
<title>Live Food Monitor</title>
<style>
body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:40px;
margin:0;
}
.box{
background:white;
padding:30px;
border-radius:15px;
width:420px;
max-width:90%;
margin:auto;
box-shadow:0 0 12px rgba(0,0,0,0.2);
}
h1{color:green;}
h2{font-weight:normal;}
</style>
</head>

<body>

<div class="box">
<h1>Food Spoilage Detection</h1>
<h2 id="gas">Gas: Loading...</h2>
<h2 id="moist">Moisture: Loading...</h2>
<h2 id="status">Status: Loading...</h2>
</div>

<script>

async function loadData(){

let url = "https://api.thingspeak.com/channels/3361476/feeds/last.json?api_key=W23Y9US9AT7U9T5S";

let response = await fetch(url);
let data = await response.json();

let gas = Number(data.field1);
let moist = Number(data.field2);

document.getElementById("gas").innerText = "Gas Value: " + gas;
document.getElementById("moist").innerText = "Moisture: " + moist;

let status = "FRESH";

if(gas > 240 || moist < 300)
status = "ROTTEN";
else if(gas > 180)
status = "BAD";
else if(gas > 120)
status = "OK";

document.getElementById("status").innerText = "Food Status: " + status;
}

loadData();
setInterval(loadData,15000);

</script>

</body>
</html>
